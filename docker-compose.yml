version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: aaron2k7au4a83
      MYSQL_DATABASE: whiskyjoy
      MYSQL_USER: aaron
      MYSQL_PASSWORD: aaron2k7au4a83
    volumes:
      - mysql_data:/var/lib/mysql
      - ./whiskyjoy_sql:/docker-entrypoint-initdb.d
    networks:
      - whisky-net

  backend:
    build: ./whiskyjoy-backend
    restart: always
    depends_on:
      - db
    ports:
      - "3000:3000"
    env_file:
      - ./whiskyjoy-backend/.env
    environment:
      - DB_HOST=db
    volumes:
      # 1. 拿掉 node_modules 掛載，讓容器使用 build 時裝好的套件
      # 2. 圖片永久保存：掛載到伺服器本地資料夾
      - ./whiskyjoy-backend/public/uploads:/app/public/uploads
    networks:
      - whisky-net

  frontend:
    build: ./whiskyjoy-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      # 讓前端 Nginx 也能讀取到後端上傳的圖片
      - ./whiskyjoy-backend/public/uploads:/usr/share/nginx/html/uploads:ro
    networks:
      - whisky-net

networks:
  whisky-net:
    driver: bridge

volumes:
  mysql_data: